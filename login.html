<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Sistema de Motoristas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 100%;
            max-width: 380px;
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 36px 32px;
        }
        .login-badge {
            width: 52px; height: 52px; border-radius: 12px;
            background: linear-gradient(135deg,#1a56db,#0e3fa8);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 20px; color: #fff;
            margin-bottom: 20px;
        }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        p.sub { font-size: 13px; color: #7d8590; margin-bottom: 28px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #7d8590; margin-bottom: 5px; display: block; }
        input {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08); background: #0d1117;
            color: #e6edf3; font-size: 14px; margin-bottom: 14px;
        }
        input:focus { outline: none; border-color: rgba(26,86,219,.6); }
        button {
            width: 100%; padding: 11px; border-radius: 8px; border: none;
            background: #1a56db; color: #fff; font-size: 14px;
            font-weight: 600; cursor: pointer; margin-top: 6px;
            transition: background .2s;
        }
        button:hover { background: #1648c0; }
        #msgErro {
            font-size: 12px; color: #ff5252; margin-top: 10px;
            text-align: center; display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-badge">GR</div>
        <h1>Bem-vindo</h1>
        <p class="sub">Sistema de Gestão de Motoristas</p>

        <form id="formLogin">
            <label>Usuário</label>
            <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="username">

            <label>Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">

            <button type="submit" id="btnEntrar">Entrar</button>
            <p id="msgErro"></p>
        </form>
    </div>

    <script>
        // redireciona se já estiver logado
        const token = localStorage.getItem('gr_token');
        if (token) window.location.href = 'index.html';

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value.trim();
            const senha   = document.getElementById('senha').value;
            const msgErro = document.getElementById('msgErro');
            const btn     = document.getElementById('btnEntrar');

            if (!usuario || !senha) {
                msgErro.textContent = 'Preencha usuário e senha.';
                msgErro.style.display = 'block';
                return;
            }

            btn.textContent = 'Entrando...';
            btn.disabled = true;
            msgErro.style.display = 'none';

            try {
                const res = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await res.json();

                if (data.token) {
                    localStorage.setItem('gr_token',   data.token);
                    localStorage.setItem('gr_usuario', data.usuario);
                    localStorage.setItem('gr_tipo',    data.tipo);
                    window.location.href = 'index.html';
                } else {
                    msgErro.textContent = data.erro || 'Erro ao fazer login.';
                    msgErro.style.display = 'block';
                }
            } catch (err) {
                msgErro.textContent = 'Erro de conexão com o servidor.';
                msgErro.style.display = 'block';
            }

            btn.textContent = 'Entrar';
            btn.disabled = false;
        });
    </script>
</body>
</html>
