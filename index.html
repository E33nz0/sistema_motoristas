<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Motoristas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
        }
        .page { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-badge {
            width: 48px; height: 48px; border-radius: 10px;
            background: linear-gradient(135deg,#1a56db,#0e3fa8);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px; color: #fff;
        }
        .logo-text { font-size: 18px; font-weight: 700; }
        .logo-sub  { font-size: 12px; color: #7d8590; }
        #btnSair {
            padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,.08);
            background: transparent; color: #7d8590; font-size: 13px; cursor: pointer;
        }
        #btnSair:hover { background: rgba(255,255,255,.06); color: #e6edf3; }
        .usuario-info { font-size: 13px; color: #7d8590; margin-right: 10px; }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .subtitulo { color: #7d8590; font-size: 14px; margin-bottom: 32px; }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; }
        .card {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 12px; padding: 24px;
            text-decoration: none; color: #e6edf3;
            transition: all .2s; display: block;
        }
        .card:hover {
            background: rgba(255,255,255,.07);
            border-color: rgba(26,86,219,.5);
            transform: translateY(-2px);
        }
        .card-icon { font-size: 32px; margin-bottom: 12px; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .card-desc { font-size: 12px; color: #7d8590; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="logo">
                <div class="logo-badge">GR</div>
                <div>
                    <div class="logo-text">Sistema de Motoristas</div>
                    <div class="logo-sub">Gestão e controle de documentos</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="usuario-info" id="nomeUsuario"></span>
                <button id="btnSair">Sair</button>
            </div>
        </header>

        <h1>Módulos</h1>
        <p class="subtitulo">Selecione um módulo para acessar</p>

        <div class="cards">
            <a href="motoristas/index.html" class="card">
                <div class="card-icon">👤</div>
                <div class="card-title">Motoristas</div>
                <div class="card-desc">Cadastros, documentos, CNH e alertas de vencimento</div>
            </a>
        </div>
    </div>

    <script src="api/api.js"></script>
    <script>
        // verifica se está logado
        GR_API.verificarAuth();

        // mostra nome do usuário
        const nome = localStorage.getItem('gr_usuario');
        if (nome) document.getElementById('nomeUsuario').textContent = 'Olá, ' + nome;

        // botão sair
        document.getElementById('btnSair').addEventListener('click', () => {
            localStorage.removeItem('gr_token');
            localStorage.removeItem('gr_usuario');
            localStorage.removeItem('gr_tipo');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
